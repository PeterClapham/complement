experiment:
  name: cls_collapse_mnist_groupnorm
  results_dir: results
model:
  name: variational_gon_groupnorm
  latent_dim: 48
  base_channels: 32
  output_channels: 1
datasets:
  - name: mnist
    data_dir: E:/Code/gon-spectrum/dataset
    download: false
    image_size: 32
    binarize: false
training:
  epochs: 40
  batch_size: 128
  learning_rate: 0.0001
  device: cuda
  progress: false
replay_study:
  dataset: mnist
  seed: 0
  beta_inf: 1.0
  beta_opt: 1.0
  replay_weight: 1.0
  replay_every: 1
  buffer_capacity: 4096
  warmup_batches: 16
  eval_batch_size: 512
  active_sigma_threshold: 0.5
