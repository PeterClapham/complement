experiment:
  name: reconstruction_probe
  results_dir: results
seeds:
  - 0
datasets:
  - name: mnist
    data_dir: data/mnist
    split: train
    download: true
    image_size: 32
    binarize: false
    validation_fraction: 0.1
model:
  name: variational_gon
  latent_dim: 48
  base_channels: 32
  output_channels: 1
training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.0001
  device: cuda
  save_model: false
  progress: true
probe:
  monitor_metric: elbo_opt_reconstruction
  patience: 20
  min_delta: 0.1
betas:
  values: [0.01, 1.0, 10.0]
