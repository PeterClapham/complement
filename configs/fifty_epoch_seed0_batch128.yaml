experiment:
  name: variational_gon_seed0_batch128_50ep
  results_dir: results
seeds:
  - 0
datasets:
  - name: mnist
    data_dir: data/mnist
    split: train
    download: true
    image_size: 32
    binarize: false
    validation_fraction: 0.0
model:
  name: variational_gon
  latent_dim: 48
  base_channels: 32
  output_channels: 1
training:
  epochs: 50
  batch_size: 128
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  learning_rate: 0.0001
  device: cuda
  save_model: true
  progress: false
  artifact_epochs: [50]
betas:
  values: [0.01, 0.05, 0.1, 0.5, 1.0, 5.0, 10.0]
