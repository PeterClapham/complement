experiment:
  name: input_pipeline_benchmark_base_seq
  results_dir: results
seeds:
  - 0
datasets:
  - name: mnist
    data_dir: data/mnist
    split: train
    download: true
    image_size: 32
    binarize: false
    validation_fraction: 0.0
model:
  name: variational_gon
  latent_dim: 48
  base_channels: 32
  output_channels: 1
training:
  epochs: 3
  batch_size: 128
  learning_rate: 0.0001
  device: cuda
  save_model: false
  progress: false
  num_workers: 0
  pin_memory: false
  persistent_workers: false
betas:
  values: [1.0]
