experiment:
  name: variational_gon_seed0_batch128_80ep
  results_dir: results
seeds:
  - 0
datasets:
  - name: mnist
    data_dir: data/mnist
    split: train
    download: true
    image_size: 32
    binarize: false
    cache_tensors: true
    validation_fraction: 0.0
model:
  name: variational_gon
  latent_dim: 48
  base_channels: 32
  output_channels: 1
training:
  batch_size: 128
  device: cuda
evaluation:
  batch_size: 128
  device: cuda
  output_dir: results/evaluation/mnist_seed0_80ep
  checkpoint_epochs: [50, 60, 70, 80]
  representation_entropy_bins: 30
  posterior_collapse:
    active_sigma_threshold: 0.5
    passive_sigma_mean_tolerance: 0.1
    passive_sigma_var_threshold: 0.01
    passive_mu_mean_tolerance: 0.1
    passive_mu_var_threshold: 0.01
betas:
  values: [0.01, 0.05, 0.1, 0.5, 1.0, 5.0, 10.0]
