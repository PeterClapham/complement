experiment:
  name: latent_dim_search_mnist
  results_dir: results
seeds:
  - 0
  - 1
  - 2
datasets:
  - name: mnist
    data_dir: data/mnist
    split: train
    download: true
    image_size: 32
    binarize: false
    cache_tensors: true
    validation_fraction: 0.1
model:
  name: variational_gon
  latent_dim: 48
  base_channels: 32
  output_channels: 1
training:
  epochs: 50
  batch_size: 128
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  learning_rate: 0.0001
  device: cuda
  save_model: false
  progress: false
probe:
  patience: 51
  min_delta: 0.0
  monitor_metric: elbo_opt_reconstruction
latent_dimension_search:
  dataset: mnist
  beta_inf: 1.0
  beta_opt: 1.0
  round: 0
  rounds: 4
  low: 16
  high: 128
  step: 16
  min_step: 1
