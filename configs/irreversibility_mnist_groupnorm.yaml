experiment:
  name: cls_collapse_mnist_groupnorm
  results_dir: results
model:
  name: variational_gon_groupnorm
  latent_dim: 48
  base_channels: 32
  output_channels: 1
datasets:
  - name: mnist
    data_dir: E:/Code/gon-spectrum/dataset
    download: false
    image_size: 32
    binarize: false
training:
  epochs: 25
  batch_size: 128
  learning_rate: 0.0001
  device: cuda
  progress: false
irreversibility:
  source_experiment_name: variational_gon_groupnorm_seed0_batch128_150ep
  dataset: mnist
  seed: 0
  beta_inf: 1.0
  collapsed_beta_opt: 10.0
  release_beta_opt: 0.0
  eval_batch_size: 512
  active_sigma_threshold: 0.5
